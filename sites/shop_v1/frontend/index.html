<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shop_v1</title>
    <meta name="description" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Acme Shop" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body class="antialiased text-slate-900 bg-white">
    <!--
      Pre-rendered structural shell so DOM-snapshot-before-hydration agents see
      meaningful structure even before React mounts. The shell mirrors the
      header/nav/footer the app renders post-hydration; the dynamic content
      area becomes the React mount point.
    -->
    <div id="ssr-shell" data-pre-hydration>
      <header class="border-b border-slate-200 sticky top-0 z-10 bg-white">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <a href="/" class="font-bold text-xl">Acme Shop</a>
          <nav aria-label="Primary" class="hidden md:flex gap-6 text-sm">
            <a href="/products">Products</a>
            <a href="/search">Search</a>
            <a href="/account">Account</a>
          </nav>
          <div class="flex items-center gap-3">
            <a href="/cart" aria-label="View cart">Cart</a>
            <a href="/login" aria-label="Sign in (header)">Sign in</a>
          </div>
        </div>
      </header>
      <main role="main" class="max-w-7xl mx-auto px-4 py-8">
        <p class="text-slate-500">Loading…</p>
      </main>
      <footer class="border-t border-slate-200 mt-16">
        <div class="max-w-7xl mx-auto px-4 py-6 text-sm text-slate-500">
          &copy; Acme Shop · synthetic site for revar
        </div>
      </footer>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
