# SPDX-License-Identifier: Apache-2.0
#
# Release workflow.
#
# Triggers:
#   - push of a tag matching v*  -> publish both packages to PyPI
#   - manual dispatch            -> dry-run to TestPyPI (no GitHub Release)
#
# Auth:
#   We use PyPI Trusted Publishing (OIDC). No PYPI_API_TOKEN secret needed.
#   You must register both projects on PyPI/TestPyPI as trusted publishers
#   before the first run — see RELEASING.md.
#
# Sequencing:
#   revar depends on `revar-models==<same version>`, so we publish models
#   first and only then publish revar. If publishing models fails, revar is
#   skipped and the version remains unreleased on PyPI.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: testpypi
        type: choice
        options: [testpypi, pypi]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------
  # Sanity checks: lint + unit tests must pass before we push to a registry.
  # ----------------------------------------------------------------------
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install -e packages/shared-models
          pip install -e 'packages/core-py[dev]'
          pip install ruff
      - name: Lint
        run: ruff check packages
      - name: Test
        run: pytest -q packages
      - name: Verify version triple is consistent
        run: python scripts/check_versions.py

  # ----------------------------------------------------------------------
  # Build sdist + wheel for both packages once, then upload artifacts.
  # ----------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: [preflight]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Build revar-models
        run: python -m build packages/shared-models
      - name: Build revar
        run: python -m build packages/core-py
      - name: Upload models dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-revar-models
          path: packages/shared-models/dist/
      - name: Upload revar dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-revar
          path: packages/core-py/dist/

  # ----------------------------------------------------------------------
  # Publish revar-models first (revar depends on it).
  # ----------------------------------------------------------------------
  publish-models:
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') && 'testpypi' || 'pypi' }}
      url: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') && format('https://test.pypi.org/project/revar-models/') || format('https://pypi.org/project/revar-models/') }}
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - name: Download models dist
        uses: actions/download-artifact@v4
        with:
          name: dist-revar-models
          path: dist/
      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
      - name: Publish to PyPI
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1

  # ----------------------------------------------------------------------
  # Publish revar second.
  # ----------------------------------------------------------------------
  publish-revar:
    runs-on: ubuntu-latest
    needs: [publish-models]
    environment:
      name: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') && 'testpypi' || 'pypi' }}
      url: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') && format('https://test.pypi.org/project/revar/') || format('https://pypi.org/project/revar/') }}
    permissions:
      id-token: write
    steps:
      - name: Download revar dist
        uses: actions/download-artifact@v4
        with:
          name: dist-revar
          path: dist/
      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
      - name: Publish to PyPI
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1

  # ----------------------------------------------------------------------
  # Cut a GitHub Release for tag pushes (skipped on dispatch dry-runs).
  # Notes come from CHANGELOG.md's section for this version.
  # ----------------------------------------------------------------------
  github-release:
    runs-on: ubuntu-latest
    needs: [publish-revar]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          tag="${GITHUB_REF##*/}"           # e.g. v0.1.1
          version="${tag#v}"
          python scripts/extract_changelog.py "$version" > RELEASE_NOTES.md
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Download both dists
        uses: actions/download-artifact@v4
        with:
          path: dist-all
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.notes.outputs.tag }}" \
            --title "${{ steps.notes.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md \
            dist-all/dist-revar/* \
            dist-all/dist-revar-models/*
