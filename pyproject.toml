# Workspace-level pyproject for resurf monorepo. Individual packages
# under packages/ have their own pyproject.toml and are installed as editable
# packages during development. See CONTRIBUTING.md for development setup.

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "sites/shop_v1/frontend",
    "sites/shop_v1/backend/data",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF"]
ignore = ["E501"]  # line length handled by formatter

[tool.pytest.ini_options]
testpaths = ["tests", "packages/core-py/tests", "packages/shared-models/tests"]
filterwarnings = ["ignore::DeprecationWarning"]
