id: shop_v1.find.acme_bluetooth_speaker
site: shop_v1
category: find
hardness: easy
viewport: desktop
seed: 42
goal: |
  Find the product "Acme Bluetooth Speaker" in the Acme Shop catalog and open
  its detail page so its price, rating, and full description are visible.
parameters:
  product_name: Acme Bluetooth Speaker
  product_slug: acme-bluetooth-speaker
modifiers:
  latency_profile: fast
success:
  type: state_predicate
  query: |
    SELECT COUNT(*) AS count FROM eventlog
    WHERE type = 'product_view' AND detail LIKE '%"slug": "acme-bluetooth-speaker"%'
  predicate: result >= 1
budget:
  max_steps: 15
  max_tokens: 30000
  max_wall_clock_s: 90
tags: ["smoke", "navigation"]
