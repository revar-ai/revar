id: shop_v1.mobile.acme_speaker_checkout_iphone15
site: shop_v1
category: mobile
hardness: medium
viewport: mobile_iphone15
seed: 42
goal: |
  Using the mobile-sized layout, buy 1 of "Acme Bluetooth Speaker". Ship to
  your default address. Use card 4242 4242 4242 4242, exp 12/30, CVC 123.
  No promo code needed.
user_credentials:
  email: alex@example.com
  password: password123
parameters:
  product_name: Acme Bluetooth Speaker
  product_slug: acme-bluetooth-speaker
modifiers:
  latency_profile: realistic
  payment_outcome: success
success:
  type: state_predicate
  query: |
    SELECT COUNT(*) AS count FROM "order"
    WHERE user_id = :seeded_user_id
      AND status = 'paid'
      AND id IN (
        SELECT order_id FROM orderitem
        WHERE product_name = 'Acme Bluetooth Speaker'
      )
  predicate: result >= 1
budget:
  max_steps: 40
  max_tokens: 120000
  max_wall_clock_s: 240
tags: ["mobile", "checkout"]
